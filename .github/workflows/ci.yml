name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "artifacts/precisefect/dist/**"
      - "artifacts/api-server/dist/**"
  pull_request:
    branches: [main, master]

env:
  PORT: "5173"
  BASE_PATH: "/"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck libraries
        run: pnpm run typecheck:libs

      - name: Typecheck scripts and frontends
        run: |
          pnpm --filter @workspace/scripts run typecheck
          pnpm --filter @workspace/precisefect run typecheck
          pnpm --filter @workspace/mockup-sandbox run typecheck

      - name: Build Precisefect
        run: pnpm --filter @workspace/precisefect run build

      - name: Build mockup-sandbox
        env:
          BASE_PATH: "/__mockup"
          PORT: "5174"
        run: pnpm --filter @workspace/mockup-sandbox run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

  hostinger-artifacts:
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PORT: "3000"
      BASE_PATH: "/"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build production artifacts
        env:
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: node scripts/build-prod.mjs

      - name: Commit production artifacts for Hostinger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/precisefect/dist artifacts/api-server/dist
          if git diff --staged --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: publish Hostinger production artifacts [skip ci]"
          git push
